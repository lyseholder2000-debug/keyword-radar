<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hovmand A/S — Placeholder Document</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f5f5f7;
    color: #1d1d1f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .document {
    background: #fff;
    border-radius: 12px;
    max-width: 700px;
    width: 100%;
    padding: 60px 48px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 2px solid #af1917;
  }

  .logo {
    font-size: 28px;
    font-weight: 600;
    color: #af1917;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .doc-type {
    font-size: 12px;
    color: #86868b;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: right;
  }

  .placeholder-badge {
    display: inline-block;
    background: #f5f5f7;
    color: #86868b;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 32px;
  }

  .line {
    height: 10px;
    background: #f0f0f0;
    border-radius: 5px;
    margin-bottom: 14px;
  }

  .line.short { width: 45%; }
  .line.medium { width: 70%; }
  .line.long { width: 90%; }
  .line.full { width: 100%; }

  .section {
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #af1917;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .table-row {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
  }

  .table-row .line { flex: 1; }

  .footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid #e5e5e5;
    text-align: center;
    color: #86868b;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="document">
  <div class="header">
    <div class="logo">Hovmand</div>
    <div class="doc-type">Sales Document<br>Quote-to-Cash</div>
  </div>

  <div class="placeholder-badge">Placeholder PDF</div>

  <div class="section">
    <div class="section-title">Customer Details</div>
    <div class="line long"></div>
    <div class="line medium"></div>
    <div class="line short"></div>
  </div>

  <div class="section">
    <div class="section-title">Order Lines</div>
    <div class="table-row">
      <div class="line full"></div>
      <div class="line short"></div>
    </div>
    <div class="table-row">
      <div class="line full"></div>
      <div class="line short"></div>
    </div>
    <div class="table-row">
      <div class="line full"></div>
      <div class="line short"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Terms & Conditions</div>
    <div class="line full"></div>
    <div class="line long"></div>
    <div class="line medium"></div>
    <div class="line full"></div>
    <div class="line short"></div>
  </div>

  <div class="footer">
    Hovmand A/S — This is a placeholder document for demonstration purposes
  </div>
</div>

</body>
</html>
